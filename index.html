    position:absolute;
    inset:0;
    background-image:

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- OCR now handled via cloud API — no in-browser OCR library needed -->
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const browseBtn = document.getElementById('browseBtn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');

browseBtn.addEventListener('click', () => fileInput.click());

let currentMode = 'numbers';
const modeNumbersBtn = document.getElementById('modeNumbersBtn');
const modeTextBtn = document.getElementById('modeTextBtn');
modeNumbersBtn.addEventListener('click', () => {
  currentMode = 'numbers';
  modeNumbersBtn.classList.add('active');
  modeTextBtn.classList.remove('active');
});
modeTextBtn.addEventListener('click', () => {
  currentMode = 'text';
  modeTextBtn.classList.add('active');
  modeNumbersBtn.classList.remove('active');
});
dropzone.addEventListener('click', (e) => { if(e.target === dropzone || e.target.classList.contains('dz-inner')) fileInput.click(); });

['dragover'].forEach(evt => dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
['dragleave','drop'].forEach(evt => dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));
dropzone.addEventListener('drop', e => {
  const files = Array.from(e.dataTransfer.files);
  if(files.length) handleFiles(files);
});
fileInput.addEventListener('change', e => {
  const files = Array.from(e.target.files);
  if(files.length) handleFiles(files);
  fileInput.value = '';
});

/* ---------- regex-based extraction (used when no table structure is available) ---------- */

const PATTERNS = [
  /(?:C\.?\s*M\.?\s*S\.?\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9][A-Za-z0-9\-\/\.]{1,22})/gi,
  /(?:Case\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9][A-Za-z0-9\-\/\.]{1,25})/gi,
  /(?:W\.?\s*P\.?\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:Writ\s*Petition\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:Crl\.?\s*(?:Misc\.?|Appeal|Rev(?:ision)?)?\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:C\.?\s*R\.?\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:F\.?\s*A\.?\s*O\.?\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:R\.?\s*F\.?\s*A\.?\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:I\.?\s*C\.?\s*A\.?\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:Appeal\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
  /(?:Suit\s*No\.?)\s*[:.\-]?\s*([A-Za-z0-9\-\/\.]{1,20})/gi,
];
// Row-based OCR/plain-text tables: the CMS number is usually the first 6-10 digit
// token on a line, whether or not a short serial number appears before it.
function extractRowNumbers(text){
  const found = [];
  const lines = text.split(/[\r\n]+/);
  for(const line of lines){
    const tokens = line.split(/\s+/).filter(Boolean);
    for(const tok of tokens){
      if(/^\d{6,10}$/.test(tok)){
        found.push(tok);
        break;
      }
    }
  }
  return found;
}
// Last resort: numbers with a slash, e.g. 1234/2024 (page indicators like "1/26" are excluded)
const SLASH_FALLBACK = /\b(\d{2,6}[\-\/][A-Za-z]{0,3}\/?\d{2,4})\b/g;

function looksLikePageMarker(context){
  return /page\s*\d/i.test(context) || /\b\d{1,3}\s*\/\s*\d{1,4}\b\s*$/.test(context.trim());
}

function extractCandidates(text){
  const found = [];
  for(const re of PATTERNS){
    re.lastIndex = 0;
    let m;
    while((m = re.exec(text)) !== null){
      const val = m[1].trim().replace(/[.,;]+$/,'');
      if(val.length < 2) continue;
      if(!/\d/.test(val)) continue; // reject matches with no digits at all (e.g. stray header words)
      found.push(val);
    }
  }
  if(found.length === 0){
    const rowNums = extractRowNumbers(text);
    if(rowNums.length) found.push(...rowNums);
  }
  if(found.length === 0){
    let m;
    SLASH_FALLBACK.lastIndex = 0;
    while((m = SLASH_FALLBACK.exec(text)) !== null){
      const val = m[1].trim();
      const start = Math.max(0, m.index - 25);
      const end = Math.min(text.length, m.index + m[0].length + 25);
      const context = text.slice(start,end);
      if(looksLikePageMarker(context)) continue;
      found.push(val);
    }
  }
  return found;
}

/* ---------- table-column-aware extraction (used for real Word/Excel/HTML tables) ---------- */

function extractTableColumn(html){
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const tables = doc.querySelectorAll('table');
  const candidates = [];
  tables.forEach(table => {
    const rows = Array.from(table.querySelectorAll('tr'));
    if(rows.length < 2) return;
    let headerRowIndex = -1, colIndex = -1;
    for(let r=0; r<Math.min(rows.length,10); r++){
      const cells = Array.from(rows[r].querySelectorAll('th,td'));
      for(let c=0;c<cells.length;c++){
        const t = cells[c].textContent.trim();
        if(/\bCMS\b/i.test(t) || /case\s*no/i.test(t)){
          headerRowIndex = r; colIndex = c; break;
        }
      }
      if(colIndex !== -1) break;
    }
    if(colIndex === -1) return;
    for(let r=headerRowIndex+1; r<rows.length; r++){
      const cells = Array.from(rows[r].querySelectorAll('th,td'));
      if(cells.length <= colIndex) continue;
      let val = cells[colIndex].textContent.trim();
      val = val.replace(/[^\w\-\/\.]+$/,'').replace(/^[^\w]+/,'').trim();
      if(/^\d{3,}$/.test(val) || /^[A-Za-z0-9][A-Za-z0-9\-\/\.]{2,20}$/.test(val)){
        candidates.push(val);
      }
    }
  });
  return candidates;
}

function stripHtmlToText(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function looksLikeBase64(s){
  const cleaned = s.replace(/\s+/g,'');
  if(cleaned.length < 60) return false;
  return /^[A-Za-z0-9+/=]+$/.test(cleaned);
}

function decodeMhtmlToHtml(raw){
  // MHTML: MIME multipart message, base64-encoded HTML body between headers and closing boundary.
  const bIdx = raw.search(/Content-Transfer-Encoding:\s*base64/i);
  if(bIdx === -1) return null;
  const afterHeader = raw.slice(bIdx);
  const blankLineMatch = afterHeader.match(/\r?\n\r?\n/);
  if(!blankLineMatch) return null;
  const bodyStart = bIdx + blankLineMatch.index + blankLineMatch[0].length;
  const boundaryMatch = raw.match(/boundary=["']?([^"'\r\n;]+)["']?/i);
  let bodyEnd = raw.length;
  if(boundaryMatch){
    const closeIdx = raw.indexOf('--' + boundaryMatch[1], bodyStart);
    if(closeIdx !== -1) bodyEnd = closeIdx;
  }
  const b64 = raw.slice(bodyStart, bodyEnd).replace(/\s+/g,'');
  try{
    const binaryStr = atob(b64);
    const bytes = Uint8Array.from(binaryStr, c => c.charCodeAt(0));
    return new TextDecoder('utf-8', {fatal:false}).decode(bytes);
  }catch(e){
    return null;
  }
}

/* ---------- image preprocessing + OCR ---------- */

function otsuThreshold(histogram, total){
  let sum = 0;
  for(let i=0;i<256;i++) sum += i*histogram[i];
  let sumB=0, wB=0, wF=0, varMax=0, threshold=127;
  for(let t=0;t<256;t++){
    wB += histogram[t];
    if(wB===0) continue;
    wF = total - wB;
    if(wF===0) break;
    sumB += t*histogram[t];
    const mB = sumB/wB;
    const mF = (sum-sumB)/wF;
    const varBetween = wB*wF*(mB-mF)*(mB-mF);
    if(varBetween > varMax){
      varMax = varBetween;
      threshold = t;
    }
  }
  return threshold;
}

function binarizeCanvas(sourceCanvasOrImg, minWidth){
  const iw = sourceCanvasOrImg.width || sourceCanvasOrImg.naturalWidth;
  const ih = sourceCanvasOrImg.height || sourceCanvasOrImg.naturalHeight;
  const targetWidth = Math.max(iw, minWidth || 1900);
  const scale = targetWidth / iw;
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(iw * scale);
  canvas.height = Math.round(ih * scale);
  const ctx = canvas.getContext('2d');
  // Draw without relying on CSS canvas filters (unsupported/unreliable on some mobile browsers)
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(sourceCanvasOrImg, 0, 0, canvas.width, canvas.height);

  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imgData.data;
  const total = d.length / 4;

  // Manual grayscale + contrast boost (per-pixel), avoids ctx.filter compatibility issues
  const contrast = 1.15;
  const histogram = new Array(256).fill(0);
  const gray = new Uint8ClampedArray(total);
  for(let i=0, p=0; i<d.length; i+=4, p++){
    let g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    g = (g - 128) * contrast + 128;
    g = g < 0 ? 0 : (g > 255 ? 255 : g);
    gray[p] = g;
    histogram[Math.round(g)]++;
  }

  // Sanity check: a failed/blank page render produces a near-uniform image
  let minV=255, maxV=0;
  for(let i=0;i<256;i++){ if(histogram[i]>0){ if(i<minV) minV=i; if(i>maxV) maxV=i; } }
  if(maxV - minV < 8){
    throw new Error('Page rendered blank/corrupted (no visible content) — this device/browser may have failed to render the PDF page. Please try again, or use a stronger connection.');
  }

  // Plain grayscale (no forced black/white thresholding) tests better than global
  // Otsu binarization, which can break characters into noise on uneven scans.
  for(let i=0, p=0; i<d.length; i+=4, p++){
    d[i] = d[i+1] = d[i+2] = gray[p];
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas.toDataURL('image/png');
}

function preprocessImageFile(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(binarizeCanvas(img, 1900));
    img.onerror = () => reject(new Error('Could not load image for preprocessing'));
    img.src = URL.createObjectURL(file);
  });
}

/* ---------- per-file-type extraction ---------- */

function findJpegSegments(bytes){
  const segments = [];
  let i = 0;
  while(i < bytes.length - 3){
    if(bytes[i] === 0xFF && bytes[i+1] === 0xD8 && bytes[i+2] === 0xFF){
      const start = i;
      let j = start + 2;
      let end = -1;
      while(j < bytes.length - 1){
        if(bytes[j] === 0xFF && bytes[j+1] === 0xD9){ end = j + 2; break; }
        j++;
      }
      if(end === -1) break;
      segments.push({start, end});
      i = end;
    } else {
      i++;
    }
  }
  return segments;
}

function blobToDataUrl(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('Could not read embedded image'));
    reader.readAsDataURL(blob);
  });
}

function loadImageEl(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Could not decode embedded image'));
    img.src = src;
  });
}

// Extract full-resolution embedded JPEG images directly from the raw PDF bytes,
// skipping small thumbnails. This bypasses pdf.js page.render(), which can
// silently produce corrupted/garbled canvases on some mobile browsers.
async function extractEmbeddedJpegBlobs(file){
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  const segments = findJpegSegments(bytes);
  const blobs = [];
  for(const seg of segments){
    if(seg.end - seg.start < 50000) continue; // skip thumbnails/icons
    blobs.push(new Blob([bytes.slice(seg.start, seg.end)], {type: 'image/jpeg'}));
  }
  return blobs;
}

async function extractFromPdf(file, onProgress){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let text = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  const meaningfulChars = text.replace(/\s/g,'').length;
  const avgCharsPerPage = meaningfulChars / Math.max(1, pdf.numPages);
  // Require a real amount of text per page, not just a flat total — otherwise a
  // multi-page scanned PDF whose only "text" is a small watermark (e.g. "CamScanner"
  // repeated on every page) can add up past a flat threshold and get mistaken for
  // a real digital text layer.
  if(avgCharsPerPage > 60){
    return { text, tableCandidates: null, method: 'PDF text layer' };
  }

  // Try direct embedded-JPEG extraction first (uses the browser's native, reliable
  // JPEG decoder instead of pdf.js page rendering, which can fail on some devices).
  try{
    const jpegBlobs = await extractEmbeddedJpegBlobs(file);
    if(jpegBlobs.length > 0){
      let ocrText = '';
      for(const blob of jpegBlobs){
        const dataUrl = await blobToDataUrl(blob);
        const img = await loadImageEl(dataUrl);
        const prepped = binarizeCanvas(img, 1900);
        const pageOcrText = await runOcr(prepped, onProgress);
        ocrText += pageOcrText + '\n';
      }
      if(ocrText.trim().length > 0){
        return { text: ocrText, tableCandidates: null, method: 'OCR (embedded image)' };
      }
    }
  }catch(e){ /* fall through to canvas rendering below */ }

  // Fallback: no usable embedded JPEGs found -> render pages via pdf.js canvas.
  let ocrText = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({scale: 1.8});
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(viewport.width);
    canvas.height = Math.round(viewport.height);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    try{
      await page.render({canvasContext: ctx, viewport}).promise;
    }catch(e){
      throw new Error('Could not render page ' + i + ' of the PDF (' + (e && e.message ? e.message : 'render error') + '). Please try again.');
    }
    const prepped = binarizeCanvas(canvas, canvas.width);
    const pageOcrText = await runOcr(prepped, onProgress);
    ocrText += pageOcrText + '\n';
  }
  return { text: ocrText, tableCandidates: null, method: 'OCR (scanned PDF)' };
}

async function extractFromDocx(file){
  const buf = await file.arrayBuffer();
  const htmlResult = await mammoth.convertToHtml({arrayBuffer: buf});
  const html = htmlResult.value;
  const tableCandidates = extractTableColumn(html);
  const flatText = stripHtmlToText(html);
  return { text: flatText, tableCandidates: tableCandidates.length ? tableCandidates : null, method: tableCandidates.length ? 'CMS table column' : null };
}

async function extractFromDoc(file){
  const buf = await file.arrayBuffer();
  const rawUtf8 = new TextDecoder('utf-8', {fatal:false}).decode(buf);

  // Case 1: MIME/MHTML export (common from LMS/Word "Save as web page")
  if(/MIME-Version|Content-Transfer-Encoding:\s*base64/i.test(rawUtf8)){
    const html = decodeMhtmlToHtml(rawUtf8);
    if(html){
      const tableCandidates = extractTableColumn(html);
      const flatText = stripHtmlToText(html);
      return { text: flatText, tableCandidates: tableCandidates.length ? tableCandidates : null, method: tableCandidates.length ? 'CMS table column' : null };
    }
  }
  // Case 2: plain HTML saved with .doc extension
  if(/<html|<body|<table|<p[\s>]/i.test(rawUtf8)){
    const tableCandidates = extractTableColumn(rawUtf8);
    const flatText = stripHtmlToText(rawUtf8);
    return { text: flatText, tableCandidates: tableCandidates.length ? tableCandidates : null, method: tableCandidates.length ? 'CMS table column' : null };
  }
  // Case 3: whole file is base64 text (no MIME headers)
  if(looksLikeBase64(rawUtf8)){
    try{
      const cleaned = rawUtf8.replace(/\s+/g,'');
      const binaryStr = atob(cleaned);
      const bytes = Uint8Array.from(binaryStr, c => c.charCodeAt(0));
      const decodedText = new TextDecoder('utf-8', {fatal:false}).decode(bytes);
      if(/<html|<body|<table|<p[\s>]/i.test(decodedText)){
        const tableCandidates = extractTableColumn(decodedText);
        const flatText = stripHtmlToText(decodedText);
        return { text: flatText, tableCandidates: tableCandidates.length ? tableCandidates : null, method: tableCandidates.length ? 'CMS table column' : null };
      }
      return { text: decodedText, tableCandidates: null, method: null };
    }catch(e){ /* fall through */ }
  }
  // Case 4: might really be a modern docx mislabeled as .doc
  try{
    const result = await mammoth.extractRawText({arrayBuffer: buf});
    return { text: result.value, tableCandidates: null, method: null };
  }catch(e){
    const raw = new TextDecoder('windows-1252', {fatal:false}).decode(buf);
    return { text: raw.replace(/[^\x20-\x7E\n]+/g, ' '), tableCandidates: null, method: null };
  }
}

async function extractFromXlsx(file){
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  let flatText = '';
  let tableCandidates = [];
  wb.SheetNames.forEach(name => {
    const sheet = wb.Sheets[name];
    flatText += XLSX.utils.sheet_to_csv(sheet) + '\n';
    const aoa = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
    let headerRowIdx = -1, colIdx = -1;
    for(let r=0; r<Math.min(aoa.length,10); r++){
      const row = aoa[r];
      for(let c=0;c<row.length;c++){
        const t = String(row[c]).trim();
        if(/\bCMS\b/i.test(t) || /case\s*no/i.test(t)){
          headerRowIdx = r; colIdx = c; break;
        }
      }
      if(colIdx !== -1) break;
    }
    if(colIdx !== -1){
      for(let r=headerRowIdx+1; r<aoa.length; r++){
        const row = aoa[r];
        if(colIdx >= row.length) continue;
        let val = String(row[colIdx]).trim();
        val = val.replace(/[^\w\-\/\.]+$/,'').replace(/^[^\w]+/,'').trim();
        if(/^\d{3,}$/.test(val) || /^[A-Za-z0-9][A-Za-z0-9\-\/\.]{2,20}$/.test(val)){
          tableCandidates.push(val);
        }
      }
    }
  });
  return { text: flatText, tableCandidates: tableCandidates.length ? tableCandidates : null, method: tableCandidates.length ? 'CMS column' : null };
}

function getApiKey(){
  const input = document.getElementById('apiKeyInput');
  const val = input && input.value.trim();
  return val || 'helloworld'; // shared free demo key as fallback
}

// Downscale/compress an image data URL to stay under the OCR API's size limits
// and keep uploads fast, especially on slow mobile connections.
function compressDataUrl(dataUrl, maxWidth, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, (maxWidth || 1500) / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality || 0.72));
    };
    img.onerror = () => reject(new Error('Could not prepare image for upload'));
    img.src = dataUrl;
  });
}

async function runOcrOnce(imageDataUrl, onProgress){
  if(onProgress) onProgress('Uploading to OCR server...');
  const compact = await compressDataUrl(imageDataUrl, 1500, 0.72);
  const formData = new FormData();
  formData.append('apikey', getApiKey());
  formData.append('base64Image', compact);
  formData.append('language', 'eng');
  formData.append('OCREngine', '2');
  formData.append('scale', 'true');
  formData.append('isOverlayRequired', 'false');

  const resp = await fetch('https://api.ocr.space/parse/image', {
    method: 'POST',
    body: formData
  });
  if(!resp.ok){
    throw new Error('OCR server responded with an error (HTTP ' + resp.status + ').');
  }
  if(onProgress) onProgress('Reading response...');
  const data = await resp.json();
  if(data.IsErroredOnProcessing){
    const msg = Array.isArray(data.ErrorMessage) ? data.ErrorMessage.join('; ') : (data.ErrorMessage || 'unknown error');
    throw new Error('Cloud OCR error: ' + msg);
  }
  const text = (data.ParsedResults || []).map(r => r.ParsedText || '').join('\n');
  return text;
}

async function runOcr(imageSource, onProgress){
  let lastErr = null;
  for(let attempt=1; attempt<=2; attempt++){
    try{
      if(onProgress) onProgress('Cloud OCR attempt ' + attempt + '...');
      const text = await runOcrOnce(imageSource, onProgress);
      if(text.trim().length >= 3) return text;
      lastErr = new Error('Cloud OCR returned no readable text.');
    }catch(e){
      lastErr = e;
    }
  }
  throw new Error('Cloud OCR failed after 2 attempts (' + (lastErr ? lastErr.message : 'unknown issue') + '). If using the shared demo key, it may be rate-limited right now — getting your own free key from ocr.space/ocrapi and pasting it above usually fixes this.');
}

async function extractFromImage(file, onProgress){
  const prepped = await preprocessImageFile(file);
  const text = await runOcr(prepped, onProgress);
  return { text, tableCandidates: null, method: 'OCR' };
}

async function extractFromFile(file, onProgress){
  const ext = file.name.split('.').pop().toLowerCase();
  if(ext === 'pdf') return extractFromPdf(file, onProgress);
  if(ext === 'docx') return extractFromDocx(file);
  if(ext === 'doc') return extractFromDoc(file);
  if(ext === 'xlsx' || ext === 'xls') return extractFromXlsx(file);
  if(['jpg','jpeg','png','webp'].includes(ext)) return extractFromImage(file, onProgress);
  throw new Error('Unsupported file type: ' + ext);
}

/* ---------- UI rendering ---------- */

function renderFileBlock(file){
  const block = document.createElement('div');
  block.className = 'file-block';
  block.innerHTML = `
    <div class="file-head">
      <span class="file-name">${file.name}</span>
      <span class="file-tag"><span class="spinner"></span>working</span>
    </div>
    <div class="body-pad"><div class="empty-note">Extracting...</div></div>
  `;
  resultsEl.prepend(block);
  return block;
}

function renderResults(block, candidates, fullText, method, errMsg){
  const tag = block.querySelector('.file-tag');
  const body = block.querySelector('.body-pad');
  if(errMsg){
    tag.textContent = 'error';
    body.innerHTML = `<div class="empty-note">Could not read this file: ${escapeHtml(errMsg)}</div>`;
    return;
  }

  if(currentMode === 'text'){
    tag.textContent = 'text extracted';
    body.innerHTML = '';
    if(method){
      const note = document.createElement('div');
      note.className = 'method-note';
      note.textContent = 'Method: ' + method;
      body.appendChild(note);
    }
    const box = document.createElement('div');
    box.className = 'fulltext-out';
    box.textContent = fullText || '(no text found)';
    body.appendChild(box);
    if(fullText && fullText.trim().length > 0){
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-fulltext-btn';
      copyBtn.textContent = 'Copy Full Text';
      copyBtn.addEventListener('click', () => {
        copyText(fullText).then(() => {
          copyBtn.textContent = 'Copied!';
          setTimeout(() => copyBtn.textContent = 'Copy Full Text', 1200);
        });
      });
      body.appendChild(copyBtn);
    }
    return;
  }

  tag.textContent = candidates.length + ' found';
  body.innerHTML = '';
  if(method){
    const note = document.createElement('div');
    note.className = 'method-note';
    note.textContent = 'Method: ' + method;
    body.appendChild(note);
  }
  if(candidates.length === 0){
    const p = document.createElement('div');
    p.className = 'empty-note';
    p.textContent = 'No case number detected. Expand below to check the raw text.';
    body.appendChild(p);
  } else {
    const grid = document.createElement('div');
    grid.className = 'number-grid';
    candidates.forEach(val => {
      const card = document.createElement('div');
      card.className = 'number-card';
      card.innerHTML = `<span class="number-text">${escapeHtml(val)}</span><button class="copy-btn" data-val="${escapeHtml(val)}">Copy</button>`;
      grid.appendChild(card);
    });
    body.appendChild(grid);
    if(candidates.length > 1){
      const copyAllBtn = document.createElement('button');
      copyAllBtn.className = 'copy-all';
      copyAllBtn.textContent = 'Copy All';
      copyAllBtn.addEventListener('click', () => {
        copyText(candidates.join('\n')).then(() => {
          copyAllBtn.textContent = 'Copied!';
          setTimeout(() => copyAllBtn.textContent = 'Copy All', 1200);
        });
      });
      body.appendChild(copyAllBtn);
    }
  }
  const det = document.createElement('details');
  det.innerHTML = `<summary>View raw extracted text</summary><div class="fulltext">${escapeHtml((fullText||'').slice(0,8000))}</div>`;
  body.appendChild(det);

  body.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      copyText(btn.dataset.val).then(() => {
        btn.textContent = 'Copied';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
      });
    });
  });
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext){
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  return fallbackCopy(text);
}

function fallbackCopy(text){
  return new Promise((resolve) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '0';
    ta.style.left = '-9999px';
    ta.setAttribute('readonly', '');
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    resolve();
  });
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let allCandidatesGlobal = [];

async function handleFiles(files){
  statusEl.textContent = files.length + ' file(s) received, processing...';
  for(const file of files){
    const block = renderFileBlock(file);
    const tag = block.querySelector('.file-tag');
    const onProgress = (msg) => { tag.innerHTML = '<span class="spinner"></span>' + escapeHtml(msg); };
    try{
      const { text, tableCandidates, method } = await extractFromFile(file, onProgress);
      const candidates = tableCandidates && tableCandidates.length ? tableCandidates : extractCandidates(text);
      let shownMethod = null;
      if(tableCandidates && tableCandidates.length) shownMethod = method;
      else if(candidates.length) shownMethod = method ? method + ' + pattern match' : 'pattern match';
      renderResults(block, candidates, text || '(empty)', shownMethod);
      if(currentMode === 'numbers') allCandidatesGlobal.push(...candidates);
    }catch(err){
      renderResults(block, [], '', null, err.message || 'unknown error');
    }
  }
  statusEl.textContent = 'Done.';
  if(currentMode === 'numbers') renderGlobalCopyBar();
  renderStartOverButton();
}

function renderGlobalCopyBar(){
  const old = document.getElementById('globalCopyBar');
  if(old) old.remove();
  if(allCandidatesGlobal.length === 0) return;
  const bar = document.createElement('div');
  bar.id = 'globalCopyBar';
  bar.style.cssText = 'margin-top:16px; background:var(--card); border:2px solid var(--gold); border-radius:12px; padding:14px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:space-between; gap:10px;';
  bar.innerHTML = `
    <div style="font-size:13px; font-weight:700; color:var(--green-1);">All files combined: ${allCandidatesGlobal.length} number(s)</div>
    <button id="globalCopyAllBtn" style="border:none; background:linear-gradient(135deg, var(--green-1), var(--green-2)); color:#fff; border-radius:10px; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer;">Copy All (All Files)</button>
  `;
  resultsEl.parentNode.insertBefore(bar, resultsEl);
  document.getElementById('globalCopyAllBtn').addEventListener('click', () => {
    copyText(allCandidatesGlobal.join('\n')).then(() => {
      const b = document.getElementById('globalCopyAllBtn');
      b.textContent = 'Copied!';
      setTimeout(() => b.textContent = 'Copy All (All Files)', 1200);
    });
  });
}

function renderStartOverButton(){
  const old = document.getElementById('startOverBtn');
  if(old) old.remove();
  const btn = document.createElement('button');
  btn.id = 'startOverBtn';
  btn.textContent = 'Start Over / Upload Another File';
  btn.style.cssText = 'margin-top:16px; width:100%; border:none; background:linear-gradient(135deg, var(--green-1), var(--green-2)); color:#fff; border-radius:12px; padding:13px 16px; font-size:14px; font-weight:700; cursor:pointer; box-shadow:var(--shadow); font-family:Inter,sans-serif;';
  btn.addEventListener('click', () => {
    resultsEl.innerHTML = '';
    statusEl.textContent = '';
    fileInput.value = '';
    allCandidatesGlobal = [];
    const bar = document.getElementById('globalCopyBar');
    if(bar) bar.remove();
    btn.remove();
    dropzone.scrollIntoView({behavior:'smooth', block:'center'});
  });
  resultsEl.parentNode.insertBefore(btn, resultsEl);
}
